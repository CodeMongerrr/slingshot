name: Bug report
description: Something misbehaved
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Slingshot version
      description: Menu bar, first line
      placeholder: v1.8.3
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
      placeholder: macOS 26.3, MacBook Pro 14 M3
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, what you got instead
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log excerpt
      description: Menu bar, Show Log. Paste the lines around the problem, from both Macs if a transfer was involved.
      render: text
  - type: dropdown
    id: peers
    attributes:
      label: How many Macs were connected
      options: ["0", "1", "2 or more"]
